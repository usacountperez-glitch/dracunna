<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dracunna DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

/* CYBERPUNK BACKGROUND */

body{

background:
radial-gradient(circle at 20% 20%,rgba(255,0,255,.3),transparent),
radial-gradient(circle at 80% 40%,rgba(0,255,255,.3),transparent),
linear-gradient(#050010,#12002f);

color:white;

min-height:100vh;

overflow-x:hidden;

}

/* CITY LIGHTS */

body::after{

content:"";

position:fixed;

bottom:0;

left:0;

width:100%;

height:300px;

background:url("https://images.unsplash.com/photo-1549921296-3c3c37d49c4b?q=80&w=1600&auto=format&fit=crop");

background-size:cover;

opacity:.35;

animation:citymove 40s linear infinite;

}

@keyframes citymove{

0%{background-position:0 0}
100%{background-position:1000px 0}

}

/* HEADER */

header{

text-align:center;

font-size:70px;

padding:40px;

letter-spacing:5px;

background:linear-gradient(#fff,#a680ff);

-webkit-background-clip:text;

color:transparent;

text-shadow:0 0 25px #a66cff;

}

/* NAV */

nav{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

margin-bottom:40px;

}

/* CHROME BUTTON */

button{

padding:14px 30px;

border-radius:16px;

border:none;

font-weight:bold;

background:linear-gradient(#ffffff,#d8d8d8,#b4b4b4,#ffffff);

box-shadow:

inset 0 2px 6px #fff,

0 8px 20px rgba(0,0,0,.7);

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.1);

box-shadow:0 0 25px #ff7bff;

}

/* HERO */

.hero{

display:flex;

justify-content:center;

align-items:center;

flex-wrap:wrap;

gap:60px;

padding:80px;

}

.hero img{

width:420px;

border-radius:20px;

box-shadow:0 0 40px #ff60ff;

}

/* VISUALIZER */

.visualizer{

width:120px;

height:120px;

border-radius:50%;

border:3px solid #a680ff;

margin-top:20px;

animation:spin 10s linear infinite;

box-shadow:0 0 20px #a680ff;

}

@keyframes spin{

from{transform:rotate(0)}

to{transform:rotate(360deg)}

}

/* SECTIONS */

section{

padding:80px 40px;

text-align:center;

}

/* CARDS */

.cards{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:30px;

margin-top:40px;

}

.card{

width:260px;

background:rgba(255,255,255,.08);

border-radius:20px;

padding:15px;

backdrop-filter:blur(12px);

box-shadow:0 0 25px rgba(255,255,255,.3);

transition:.3s;

}

.card:hover{

transform:scale(1.08);

box-shadow:0 0 30px #ff7bff;

}

.card img{

width:100%;

border-radius:14px;

margin-bottom:10px;

}

/* EVENTS */

.events{

max-width:700px;

margin:auto;

}

.event{

background:linear-gradient(#fff,#cfcfcf,#a0a0a0);

color:black;

padding:14px;

margin:10px 0;

border-radius:12px;

display:flex;

justify-content:space-between;

font-weight:bold;

}

/* FOOTER */

footer{

margin-top:60px;

background:black;

padding:20px;

text-align:center;

}

</style>
</head>

<body>

<header>DRACUNNA DJ</header>

<nav>

<button>Music</button>
<button>Mixes</button>
<button>Events</button>
<button>Gallery</button>
<button>Contact</button>

</nav>

<div class="hero">

<img src="images/hero.jpg">

<div>

<h1>WELCOME TO THE FUTURE</h1>

<p>Cyber rave DJ experience</p>

<button>LISTEN NOW</button>

<div class="visualizer"></div>

</div>

</div>

<section>

<h2>Latest Mixes</h2>

<div class="cards">

<div class="card">

<img src="images/mix1.jpg">

Dreamscape Mix

</div>

<div class="card">

<img src="images/mix2.jpg">

Cyber Wave

</div>

<div class="card">

<img src="images/mix3.jpg">

Future Rave

</div>

</div>

</section>

<section>

<h2>Gallery</h2>

<div class="cards">

<div class="card"><img src="images/gallery1.jpg"></div>
<div class="card"><img src="images/gallery2.jpg"></div>
<div class="card"><img src="images/gallery3.jpg"></div>
<div class="card"><img src="images/gallery4.jpg"></div>

</div>

</section>

<section>

<h2>Events</h2>

<div class="events">

<div class="event">

<span>Rossstream</span>

<span>Bogotá</span>

</div>

<div class="event">

<span>Abyssal Rite</span>

<span>Berlin</span>

</div>

</div>

</section>

<footer>

© 2026 Dracunna DJ

</footer>

</body>
</html>
