<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRACUNA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

background:
linear-gradient(rgba(0,0,20,.9),rgba(0,0,20,.95)),
url("https://images.unsplash.com/photo-1519608487953-e999c86e7455");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;

overflow-x:hidden;

}

/* NEON LIGHTS */

body::before{

content:"";

position:fixed;

width:100%;
height:100%;

background:
radial-gradient(circle at 20% 20%,#9f5cff55,transparent 40%),
radial-gradient(circle at 80% 70%,#00eaff55,transparent 40%);

z-index:0;

animation:neonMove 10s infinite alternate;

}

@keyframes neonMove{

0%{transform:translateY(0)}
100%{transform:translateY(-40px)}

}

/* HEADER */

header{

text-align:center;

font-size:70px;

letter-spacing:6px;

padding:40px;

background:linear-gradient(#fff,#ccc,#9b9bff);

-webkit-background-clip:text;

color:transparent;

text-shadow:
0 0 15px #caa8ff,
0 0 35px #7c54ff;

}

/* NAV */

nav{

display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;

margin-bottom:40px;

}

/* CHROME BUTTON */

.chrome{

padding:14px 38px;

border-radius:12px;

border:1px solid #ffffff90;

background:linear-gradient(
180deg,
#ffffff,
#dcdcdc,
#b0b0b0,
#ffffff
);

color:#111;

font-weight:bold;

box-shadow:

inset 0 2px 6px rgba(255,255,255,1),
inset 0 -3px 6px rgba(0,0,0,.5),
0 6px 18px rgba(0,0,0,.8);

cursor:pointer;

transition:.3s;

}

.chrome:hover{

transform:translateY(-4px);

box-shadow:

0 0 25px #9c7aff,
0 5px 25px rgba(0,0,0,.9);

}

/* HERO */

.hero{

display:flex;

justify-content:center;

align-items:center;

gap:70px;

flex-wrap:wrap;

padding:80px;

}

.hero img{

width:420px;

border-radius:20px;

box-shadow:
0 0 30px #9f7bff,
0 0 80px #3a1fff;

}

/* TEXT */

.hero-text{

max-width:500px;

}

.hero-text h1{

font-size:50px;

margin-bottom:20px;

text-shadow:
0 0 20px #a57cff,
0 0 40px #5d2bff;

}

.hero-text p{

opacity:.9;

margin-bottom:30px;

}

/* CIRCULAR VISUALIZER */

.visualizer{

position:relative;

width:140px;
height:140px;

border-radius:50%;

border:4px solid #9c7aff;

box-shadow:0 0 20px #9c7aff;

margin-top:20px;

}

.circle{

position:absolute;

width:100%;
height:100%;

border-radius:50%;

border:2px solid #00eaff;

animation:spin 6s linear infinite;

}

@keyframes spin{

from{transform:rotate(0)}
to{transform:rotate(360deg)}

}

/* SECTIONS */

.section{

padding:100px;

text-align:center;

}

/* MIX CARDS */

.cards{

display:flex;

justify-content:center;

gap:30px;

flex-wrap:wrap;

margin-top:40px;

}

.card{

width:260px;

padding:20px;

border-radius:15px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(10px);

box-shadow:0 0 25px rgba(164,118,255,.6);

transition:.3s;

}

.card img{

width:100%;

border-radius:12px;

margin-bottom:10px;

}

.card:hover{

transform:translateY(-10px);

}

/* EVENTS */

.events{

max-width:650px;

margin:auto;

margin-top:40px;

}

.event{

display:flex;

justify-content:space-between;

padding:14px;

margin-bottom:12px;

border-radius:10px;

background:linear-gradient(
180deg,
#ffffff,
#cfcfcf,
#9a9a9a
);

color:black;

font-weight:bold;

box-shadow:
inset 0 3px 5px white,
0 4px 15px black;

}

/* FOOTER */

footer{

margin-top:80px;

text-align:center;

padding:30px;

background:#020003;

}

</style>

</head>

<body>

<header>DRACUNA</header>

<nav>

<button class="chrome">MUSIC</button>
<button class="chrome">TOUR</button>
<button class="chrome">STYLE</button>
<button class="chrome">MIXES</button>
<button class="chrome">CONTACT</button>

</nav>

<section class="hero">

<img src="images/dj1.jpg">

<div class="hero-text">

<h1>WELCOME TO THE FUTURE</h1>

<p>Cyber rave electronic DJ experience.</p>

<button class="chrome">LISTEN NOW</button>

<div class="visualizer">
<div class="circle"></div>
</div>

</div>

</section>

<section class="section">

<h2>Latest Mixes</h2>

<div class="cards">

<div class="card">
<img src="images/dj2.jpg">
Dreamscape EP
</div>

<div class="card">
<img src="images/dj3.jpg">
Cyber Wave Mix
</div>

<div class="card">
<img src="images/dj4.jpg">
Future Rave
</div>

</div>

</section>

<section class="section">

<h2>Upcoming Events</h2>

<div class="events">

<div class="event">
<span>02.15.24 Dream Rave</span>
<span>London</span>
</div>

<div class="event">
<span>03.08.24 Club Neon</span>
<span>Tokyo</span>
</div>

<div class="event">
<span>03.25.24 Future Fest</span>
<span>Paris</span>
</div>

</div>

</section>

<footer>

© 2026 DRACUNA

</footer>

</body>
</html>
