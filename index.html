<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dracunna DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
color:white;
overflow-x:hidden;
background:#050010;
}

/* CYBERPUNK ANIMATED BACKGROUND */

.city{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:
linear-gradient(#050010,#0b0030);
}

.city::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,#ff00ff44 2px,transparent 2px),
radial-gradient(circle,#00ffff44 2px,transparent 2px);
background-size:140px 140px;
animation:move 18s linear infinite;
}

@keyframes move{
0%{transform:translateY(0)}
100%{transform:translateY(-200px)}
}

/* HEADER */

header{
text-align:center;
font-size:70px;
padding:40px;
background:linear-gradient(#fff,#a680ff);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 30px #a66cff;
}

/* NAV */

nav{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:40px;
}

button{
padding:12px 26px;
border-radius:18px;
border:none;
font-weight:bold;
background:linear-gradient(#ffffff,#dcdcdc,#a9a9a9);
box-shadow:
inset 0 2px 6px #fff,
0 6px 20px rgba(0,0,0,.8);
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 25px #ff7bff;
}

/* HERO */

.hero{
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:60px;
padding:80px;
}

.hero img{
width:420px;
border-radius:20px;
box-shadow:0 0 40px #ff60ff;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:60px;
max-width:1200px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:16px;
box-shadow:0 0 30px rgba(255,0,255,.4);
transition:.4s;
}

.gallery img:hover{
transform:scale(1.08);
box-shadow:0 0 60px #00ffff;
}

/* FOOTER */

footer{
margin-top:60px;
background:black;
padding:20px;
text-align:center;
}

</style>
</head>

<body>

<div class="city"></div>

<header>DRACUNNA DJ</header>

<nav>
<button>Music</button>
<button>Mixes</button>
<button>Gallery</button>
<button>Events</button>
<button>Contact</button>
</nav>

<div class="hero">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.44.30 PM.jp">

<div>
<h1>Cyber Rave Experience</h1>
<p>Electronic DJ sets and live performances</p>
<button>Listen Now</button>
</div>

</div>

<section>

<h2 style="text-align:center;margin-bottom:30px;">Gallery</h2>

<div class="gallery">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.44.43 PM.jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (1).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (2).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (4).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (5).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (6).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (7).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (8).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM.jpeg">

</div>

</section>

<footer>
© 2026 Dracunna DJ
</footer>

</body>
</html>
