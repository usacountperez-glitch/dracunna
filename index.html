<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dracunna DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
color:white;
overflow-x:hidden;
}

/* CYBERPUNK CITY BACKGROUND */

.city{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-2;
background:linear-gradient(#050010,#0b0030);
}

/* moving lights */

.city::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,#ff00ff55 2px,transparent 2px),
radial-gradient(circle,#00ffff55 2px,transparent 2px);
background-size:120px 120px;
animation:moveCity 20s linear infinite;
}

@keyframes moveCity{

0%{transform:translateY(0)}
100%{transform:translateY(-200px)}

}

/* header */

header{

text-align:center;
font-size:70px;
padding:40px;
background:linear-gradient(#fff,#a680ff);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 30px #a66cff;

}

/* nav */

nav{

display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:40px;

}

button{

padding:12px 26px;
border-radius:18px;
border:none;
font-weight:bold;

background:linear-gradient(#ffffff,#dcdcdc,#a9a9a9);

box-shadow:
inset 0 2px 6px #fff,
0 6px 20px rgba(0,0,0,.8);

cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.1);
box-shadow:0 0 25px #ff7bff;

}

/* hero */

.hero{

display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:60px;
padding:80px;

}

.hero img{

width:420px;
border-radius:20px;
box-shadow:0 0 40px #ff60ff;

}

/* sections */

section{

padding:80px 40px;
text-align:center;

}

/* gallery cards */

.cards{

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:40px;

}

.card{

width:260px;
background:rgba(255,255,255,.08);
padding:16px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(255,255,255,.3);
transition:.3s;

}

.card:hover{

transform:scale(1.08);
box-shadow:0 0 40px #ff7bff;

}

.card img{

width:100%;
border-radius:14px;
margin-bottom:10px;

}

/* power girl icons */

.icons{

display:flex;
justify-content:center;
gap:30px;
margin-top:30px;

}

.icon{

width:80px;
height:80px;
border-radius:50%;
background:linear-gradient(#ff00ff,#00ffff);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
box-shadow:0 0 30px #ff00ff;

}

/* footer */

footer{

margin-top:60px;
background:black;
padding:20px;
text-align:center;

}

</style>

</head>

<body>

<div class="city"></div>

<header>DRACUNNA DJ</header>

<nav>

<button>Music</button>
<button>Mixes</button>
<button>Gallery</button>
<button>Events</button>
<button>Contact</button>

</nav>

<div class="hero">

<img src="imagenes/foto1.jpg">

<div>

<h1>Cyber Rave Experience</h1>
<p>Electronic DJ sets and live performances</p>

<button>Listen Now</button>

</div>

</div>

<section>

<h2>Latest Mixes</h2>

<div class="cards">

<div class="card">
<img src="imagenes/foto1.jpg">
Dreamscape Mix
</div>

<div class="card">
<img src="imagenes/foto1.jpg">
Cyber Wave
</div>

<div class="card">
<img src="imagenes/foto1.jpg">
Future Rave
</div>

</div>

</section>

<section>

<h2>Gallery</h2>

<div class="cards">

<div class="card"><img src="imagenes/foto1.jpg"></div>
<div class="card"><img src="imagenes/foto1.jpg"></div>
<div class="card"><img src="imagenes/foto1.jpg"></div>
<div class="card"><img src="imagenes/foto1.jpg"></div>

</div>

</section>

<section>

<h2>Power Energy</h2>

<div class="icons">

<div class="icon">⚡</div>
<div class="icon">💫</div>
<div class="icon">🔥</div>

</div>

</section>

<footer>

© 2026 Dracunna DJ

</footer>

</body>
</html>
