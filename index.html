<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DRACUNNA DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

/* FONDO REVISTA Y2K */

body{

background:
radial-gradient(circle at 20% 20%, #a56bff, transparent 40%),
radial-gradient(circle at 80% 60%, #00e0ff, transparent 40%),
linear-gradient(180deg,#2a0060,#12003a,#050015);

color:white;

min-height:100vh;

}

/* HEADER */

header{

text-align:center;

font-size:70px;

padding:40px;

background:linear-gradient(#fff,#d9d9ff,#a3a3ff);

-webkit-background-clip:text;

color:transparent;

text-shadow:
0 0 20px #caa8ff,
0 0 40px #7c54ff;

}

/* NAV */

nav{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

margin-bottom:50px;

}

/* BOTONES CHROME */

.nav-btn{

padding:12px 35px;

border-radius:12px;

border:1px solid #ffffff70;

background:linear-gradient(
180deg,
#ffffff,
#dcdcdc,
#a9a9a9,
#ffffff
);

color:#111;

font-weight:bold;

box-shadow:

inset 0 3px 5px #ffffff,
0 5px 15px rgba(0,0,0,.6);

cursor:pointer;

transition:.3s;

}

.nav-btn:hover{

transform:translateY(-3px);

box-shadow:
0 0 20px #b48bff;

}

/* HERO */

.hero{

display:flex;

justify-content:center;

align-items:center;

flex-wrap:wrap;

gap:60px;

padding:60px;

}

.hero img{

width:420px;

border-radius:20px;

box-shadow:
0 0 40px #9f7bff;

}

.hero-text{

max-width:450px;

}

.hero-text h1{

font-size:50px;

margin-bottom:20px;

text-shadow:
0 0 20px #a57cff;

}

.hero-text p{

opacity:.9;

margin-bottom:30px;

}

/* SECTIONS */

.section{

padding:100px;

text-align:center;

}

/* CARDS */

.cards{

display:flex;

justify-content:center;

gap:30px;

flex-wrap:wrap;

margin-top:40px;

}

.card{

width:260px;

padding:20px;

border-radius:15px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(8px);

box-shadow:0 0 25px rgba(164,118,255,.6);

}

.card img{

width:100%;

border-radius:10px;

margin-bottom:10px;

}

/* EVENTS */

.events{

max-width:650px;

margin:auto;

margin-top:40px;

}

.event{

display:flex;

justify-content:space-between;

padding:14px;

margin-bottom:12px;

border-radius:10px;

background:linear-gradient(#ffffff,#cfcfcf,#9a9a9a);

color:black;

font-weight:bold;

}

/* FOOTER */

footer{

margin-top:80px;

text-align:center;

padding:30px;

background:#020003;

}

</style>
</head>

<body>

<header>DRACUNNA DJ</header>

<nav>

<a href="#music"><button class="nav-btn">MUSIC</button></a>
<a href="#mixes"><button class="nav-btn">MIXES</button></a>
<a href="#events"><button class="nav-btn">EVENTS</button></a>
<a href="#contact"><button class="nav-btn">CONTACT</button></a>

</nav>

<section class="hero" id="music">

<img src="https://images.unsplash.com/photo-1517230878791-4d28214057c2">

<div class="hero-text">

<h1>WELCOME TO THE FUTURE</h1>

<p>Cyber rave DJ experience.</p>

<button class="nav-btn">LISTEN NOW</button>

</div>

</section>

<section class="section" id="mixes">

<h2>Latest Mixes</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d">
Dreamscape EP
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2">
Cyber Wave Mix
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1506157786151-b8491531f063">
Future Rave
</div>

</div>

</section>

<section class="section" id="events">

<h2>Upcoming Events</h2>

<div class="events">

<div class="event">
<span>Dream Rave</span>
<span>London</span>
</div>

<div class="event">
<span>Club Neon</span>
<span>Tokyo</span>
</div>

<div class="event">
<span>Future Fest</span>
<span>Paris</span>
</div>

</div>

</section>

<section class="section" id="contact">

<h2>Booking</h2>

<p>Email: booking@dracunna.com</p>

</section>

<footer>

© 2026 DRACUNNA DJ

</footer>

</body>
</html>
