<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dracunna DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
scroll-behavior:smooth;
}

/* BACKGROUND */

body{
background:radial-gradient(circle at top,#1a0033,#050010);
color:white;
overflow-x:hidden;
}

/* CYBER GRID */

body::before{
content:"";
position:fixed;
bottom:0;
left:0;
width:100%;
height:45%;
background:
repeating-linear-gradient(
90deg,#0ff 0px,#0ff 2px,transparent 2px,transparent 80px),
repeating-linear-gradient(
0deg,#0ff 0px,#0ff 2px,transparent 2px,transparent 80px);
opacity:.15;
animation:gridmove 6s linear infinite;
z-index:-1;
}

@keyframes gridmove{
0%{transform:translateY(0)}
100%{transform:translateY(80px)}
}

/* HEADER */

header{
text-align:center;
font-size:64px;
padding:40px;
text-shadow:0 0 20px #ff00ff,0 0 40px #00ffff;
}

/* NAV */

nav{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:40px;
}

nav a{
text-decoration:none;
}

button{
padding:12px 26px;
border-radius:18px;
border:none;
font-weight:bold;
cursor:pointer;
background:linear-gradient(#ffffff,#dcdcdc,#a9a9a9);
box-shadow:
inset 0 2px 6px #fff,
0 6px 20px rgba(0,0,0,.8);
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff7bff;
}

/* HERO */

.hero{
text-align:center;
padding:40px;
}

.hero img{
width:320px;
border-radius:20px;
box-shadow:0 0 40px #ff00ff;
margin-bottom:20px;
}

/* SECTIONS */

section{
padding:60px 20px;
text-align:center;
}

h2{
margin-bottom:30px;
font-size:32px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:16px;
box-shadow:0 0 20px rgba(255,0,255,.5);
transition:.35s;
}

.gallery img:hover{
transform:scale(1.08);
box-shadow:0 0 45px #00ffff;
}

/* EVENTS */

.events{
max-width:600px;
margin:auto;
}

.event{
display:flex;
justify-content:space-between;
background:#111;
padding:14px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px #ff00ff;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
opacity:.6;
}

</style>

</head>

<body>

<header>DRACUNNA DJ</header>

<nav>
<a href="#home"><button>Home</button></a>
<a href="#gallery"><button>Gallery</button></a>
<a href="#events"><button>Events</button></a>
<a href="#contact"><button>Contact</button></a>
</nav>

<section id="home" class="hero">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.44.43 PM.jpeg">

<h1>Cyber Rave Experience</h1>
<p>Electronic DJ sets and live performances</p>

</section>

<section id="gallery">

<h2>Gallery</h2>

<div class="gallery">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.44.30 PM.jp">
<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (1).jpeg">
<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (2).jpeg">
<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (4).jpeg">
<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (5).jpeg">
<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (6).jpeg">
<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (7).jpeg">
<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (8).jpeg">
<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM.jpeg">

</div>

</section>

<section id="events">

<h2>Events</h2>

<div class="events">

<div class="event">
<span>Rossstream</span>

</div>

</div>

</div>

</section>

<section id="contact">

<h2>Contact</h2>

<p>Booking: dracunna@email.com</p>

</section>

<footer>
© 2026 Dracunna DJ
</footer>

</body>
</html>
