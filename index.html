<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dracunna DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

/* BACKGROUND */

body{
background:#060010;
color:white;
overflow-x:hidden;
}

/* CYBER GRID */

body::before{
content:"";
position:fixed;
bottom:0;
left:0;
width:100%;
height:40%;
background:
linear-gradient(#0000,#000),
repeating-linear-gradient(
90deg,
#0ff 0px,
#0ff 2px,
transparent 2px,
transparent 80px
),
repeating-linear-gradient(
0deg,
#0ff 0px,
#0ff 2px,
transparent 2px,
transparent 80px
);
opacity:.25;
animation:gridmove 6s linear infinite;
z-index:-1;
}

@keyframes gridmove{
0%{transform:translateY(0)}
100%{transform:translateY(80px)}
}

/* HEADER */

header{
text-align:center;
font-size:60px;
padding:40px;
text-shadow:0 0 25px #ff00ff,0 0 40px #00ffff;
}

/* HERO */

.hero{
text-align:center;
margin-bottom:40px;
}

.hero img{
width:320px;
border-radius:20px;
box-shadow:0 0 40px #ff00ff;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:50px;
max-width:1200px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:16px;
box-shadow:0 0 20px rgba(255,0,255,.5);
transition:.35s;
}

.gallery img:hover{
transform:scale(1.08);
box-shadow:0 0 45px #00ffff;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
opacity:.6;
}

</style>

</head>

<body>

<header>DRACUNNA DJ</header>

<div class="hero">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.44.43 PM.jpeg">

</div>

<div class="gallery">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.44.30 PM.jp">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (1).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (2).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (4).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (5).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (6).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (7).jpeg">

<img src="imagenes/WhatsApp Image 2026-03-11 at 10.47.51 PM (8).jpeg">



</div>

<footer>

© 2026 Dracunna DJ

</footer>

</body>
</html>
