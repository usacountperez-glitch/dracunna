<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dracunna DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
scroll-behavior:smooth;
}

body{

background:
linear-gradient(rgba(0,0,40,.9),rgba(0,0,40,.95)),
url("https://images.unsplash.com/photo-1519608487953-e999c86e7455");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;

}

/* HEADER */

header{

text-align:center;

font-size:70px;

padding:40px;

background:linear-gradient(#ffffff,#cfcfff,#8f8fdc);

-webkit-background-clip:text;

color:transparent;

text-shadow:
0 0 20px #bbaaff,
0 0 40px #6b45ff;

}

/* NAVBAR */

nav{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

margin-bottom:50px;

}

/* BUTTON STYLE */

.nav-btn{

padding:12px 35px;

border-radius:12px;

border:1px solid #ffffff80;

background:linear-gradient(#ffffff,#cfcfcf,#9a9a9a);

color:black;

font-weight:bold;

box-shadow:
inset 0 2px 5px white,
0 4px 15px black;

cursor:pointer;

transition:.3s;

}

.nav-btn:hover{

transform:translateY(-3px);

box-shadow:
0 0 20px #9c7aff;

}

/* HERO */

.hero{

display:flex;

justify-content:center;

align-items:center;

flex-wrap:wrap;

gap:60px;

padding:60px;

}

.hero img{

width:420px;

border-radius:20px;

box-shadow:
0 0 30px #9f7bff,
0 0 70px #3a1fff;

}

.hero-text{

max-width:450px;

}

.hero-text h1{

font-size:50px;

margin-bottom:20px;

text-shadow:
0 0 20px #a57cff,
0 0 40px #5d2bff;

}

.hero-text p{

opacity:.9;

margin-bottom:30px;

}

/* SECTIONS */

.section{

padding:100px;

text-align:center;

}

/* MIXES */

.cards{

display:flex;

justify-content:center;

gap:30px;

flex-wrap:wrap;

margin-top:40px;

}

.card{

width:260px;

padding:20px;

border-radius:15px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(10px);

box-shadow:0 0 25px rgba(164,118,255,.6);

transition:.3s;

}

.card img{

width:100%;

border-radius:12px;

margin-bottom:10px;

}

.card:hover{

transform:translateY(-10px);

}

/* EVENTS */

.events{

max-width:650px;

margin:auto;

margin-top:40px;

}

.event{

display:flex;

justify-content:space-between;

padding:14px;

margin-bottom:12px;

border-radius:10px;

background:linear-gradient(#ffffff,#cfcfcf,#9a9a9a);

color:black;

font-weight:bold;

}

/* FOOTER */

footer{

margin-top:80px;

text-align:center;

padding:30px;

background:#020003;

}

</style>

</head>

<body>

<header>DRACUNNA DJ</header>

<nav>

<a href="#music"><button class="nav-btn">MUSIC</button></a>
<a href="#mixes"><button class="nav-btn">MIXES</button></a>
<a href="#events"><button class="nav-btn">EVENTS</button></a>
<a href="#contact"><button class="nav-btn">CONTACT</button></a>

</nav>

<section class="hero" id="music">

<img src="images/dj1.jpg">

<div class="hero-text">

<h1>WELCOME TO THE FUTURE</h1>

<p>Cyber rave DJ experience.</p>

<button class="nav-btn">LISTEN NOW</button>

</div>

</section>

<section class="section" id="mixes">

<h2>Latest Mixes</h2>

<div class="cards">

<div class="card">
<img src="images/dj2.jpg">
Dreamscape EP
</div>

<div class="card">
<img src="images/dj3.jpg">
Cyber Wave Mix
</div>

<div class="card">
<img src="images/dj4.jpg">
Future Rave
</div>

</div>

</section>

<section class="section" id="events">

<h2>Upcoming Events</h2>

<div class="events">

<div class="event">
<span>02.15.24 Dream Rave</span>
<span>London</span>
</div>

<div class="event">
<span>03.08.24 Club Neon</span>
<span>Tokyo</span>
</div>

<div class="event">
<span>03.25.24 Future Fest</span>
<span>Paris</span>
</div>

</div>

</section>

<section class="section" id="contact">

<h2>Booking</h2>

<p>Email: booking@dracunnadj.com</p>

</section>

<footer>

© 2026 Dracunna DJ

</footer>

</body>
</html>
