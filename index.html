<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DRACUNNA DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;scroll-behavior:smooth}

/* FONDO HOLOGRAFICO ANIMADO */
body{
  min-height:100vh;
  color:#fff;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,200,.35), transparent 35%),
    radial-gradient(circle at 80% 60%, rgba(0,200,255,.35), transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(120,0,255,.35), transparent 35%),
    linear-gradient(120deg,#0a0025,#1a0050,#09001f);
  background-size: 200% 200%;
  animation: holoMove 12s ease-in-out infinite alternate;
  overflow-x:hidden;
}
@keyframes holoMove{
  0%{background-position:0% 50%}
  100%{background-position:100% 50%}
}

/* GRID NEON ANIMADO (EFECTO RAVE) */
body::after{
  content:"";
  position:fixed;
  left:0;right:0;bottom:0;
  height:40vh;
  background:
    linear-gradient(transparent 70%, rgba(0,255,255,.25)),
    repeating-linear-gradient(
      to right,
      rgba(0,255,255,.25) 0px,
      rgba(0,255,255,.25) 2px,
      transparent 2px,
      transparent 60px
    ),
    repeating-linear-gradient(
      to top,
      rgba(255,0,200,.25) 0px,
      rgba(255,0,200,.25) 2px,
      transparent 2px,
      transparent 60px
    );
  transform:perspective(600px) rotateX(60deg);
  transform-origin:bottom;
  animation:gridMove 6s linear infinite;
  pointer-events:none;
}
@keyframes gridMove{
  from{background-position:0 0,0 0,0 0}
  to{background-position:0 0,120px 0,0 120px}
}

/* HEADER */
header{
  text-align:center;
  font-size:64px;
  padding:40px 20px 20px;
  letter-spacing:4px;
  background:linear-gradient(#fff,#d9d9ff,#a0a0ff);
  -webkit-background-clip:text;
  color:transparent;
  text-shadow:0 0 20px #caa8ff,0 0 40px #7c54ff;
}

/* NAV */
nav{
  display:flex;justify-content:center;gap:18px;flex-wrap:wrap;
  margin-bottom:40px;
}

/* BOTONES CHROME Y2K */
.nav-btn{
  padding:12px 28px;border-radius:14px;border:1px solid #ffffff80;
  background:linear-gradient(180deg,#ffffff,#dcdcdc,#a9a9a9,#ffffff);
  color:#111;font-weight:bold;letter-spacing:1px;
  box-shadow:inset 0 3px 6px #fff,0 6px 18px rgba(0,0,0,.7);
  cursor:pointer;transition:.25s;
}
.nav-btn:hover{
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 0 18px #c59cff,0 8px 22px rgba(0,0,0,.8);
}

/* HERO */
.hero{
  display:flex;justify-content:center;align-items:center;
  flex-wrap:wrap;gap:60px;padding:60px 20px;
}
.hero img{
  width:420px;max-width:90vw;border-radius:20px;
  box-shadow:0 0 40px #ff7bff;
}
.hero-text{max-width:480px}
.hero-text h1{
  font-size:44px;margin-bottom:14px;
  text-shadow:0 0 20px #fff,0 0 30px #8b5cff;
}
.hero-text p{opacity:.9;margin-bottom:24px}

/* VISUALIZER CIRCULAR */
.visualizer{
  position:relative;width:120px;height:120px;border-radius:50%;
  border:3px solid #9c7aff;box-shadow:0 0 18px #9c7aff;margin-top:16px;
}
.visualizer::before,.visualizer::after{
  content:"";position:absolute;inset:10px;border-radius:50%;
  border:2px dashed #00eaff;animation:spin 7s linear infinite;
}
.visualizer::after{
  inset:22px;border-style:solid;border-color:#ff7bff;
  animation-duration:10s;animation-direction:reverse;
}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* SECCIONES */
.section{padding:80px 20px;text-align:center}
.section h2{
  font-size:32px;margin-bottom:26px;
  text-shadow:0 0 14px #a57cff;
}

/* TARJETAS REVISTA */
.cards{
  display:flex;justify-content:center;gap:26px;flex-wrap:wrap;
}
.card{
  width:260px;padding:16px;border-radius:20px;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(10px);
  box-shadow:0 0 26px rgba(255,255,255,.35);
  transition:.25s;
}
.card img{
  width:100%;border-radius:14px;margin-bottom:10px;
}
.card:hover{transform:scale(1.05)}

/* EVENTOS */
.events{max-width:640px;margin:20px auto 0}
.event{
  display:flex;justify-content:space-between;gap:10px;
  padding:12px 16px;margin-bottom:10px;border-radius:12px;
  background:linear-gradient(#ffffff,#cfcfcf,#9a9a9a);
  color:#000;font-weight:bold;
}

/* FOOTER */
footer{
  margin-top:60px;text-align:center;padding:26px 10px;background:#000;
  font-size:14px;opacity:.9;
}

</style>
</head>

<body>

<header>DRACUNNA DJ</header>

<nav>
  <a href="#music"><button class="nav-btn">MUSIC</button></a>
  <a href="#mixes"><button class="nav-btn">MIXES</button></a>
  <a href="#events"><button class="nav-btn">EVENTS</button></a>
  <a href="#contact"><button class="nav-btn">CONTACT</button></a>
</nav>

<section class="hero" id="music">
  <img src="https://images.unsplash.com/photo-1544717305-996b815c338c?q=80&w=1200&auto=format&fit=crop" alt="DJ">
  <div class="hero-text">
    <h1>WELCOME TO THE FUTURE</h1>
    <p>Cyber rave DJ experience.</p>
    <button class="nav-btn">LISTEN NOW</button>
    <div class="visualizer"></div>
  </div>
</section>

<section class="section" id="mixes">
  <h2>Latest Mixes</h2>
  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2?q=80&w=1200&auto=format&fit=crop" alt="">
      Dreamscape EP
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200&auto=format&fit=crop" alt="">
      Cyber Wave Mix
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1506157786151-b8491531f063?q=80&w=1200&auto=format&fit=crop" alt="">
      Future Rave
    </div>
  </div>
</section>

<section class="section" id="events">
  <h2>Upcoming Events</h2>
  <div class="events">
    <div class="event"><span>Dream Rave</span><span>London</span></div>
    <div class="event"><span>Club Neon</span><span>Tokyo</span></div>
    <div class="event"><span>Future Fest</span><span>Paris</span></div>
  </div>
</section>

<section class="section" id="contact">
  <h2>Booking</h2>
  <p>Email: booking@dracunna.com</p>
</section>

<footer>© 2026 DRACUNNA DJ</footer>

</body>
</html>
