<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DRACUNNA DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

/* FONDO Y2K HOLOGRAPHIC */

body{

background:

linear-gradient(120deg,#8a2be2,#4b00ff,#00c3ff,#ff00cc);

background-size:400% 400%;

animation:gradientMove 12s infinite alternate;

color:white;

min-height:100vh;

}

@keyframes gradientMove{

0%{background-position:0% 50%}
100%{background-position:100% 50%}

}

/* HEADER */

header{

text-align:center;

font-size:70px;

padding:40px;

background:linear-gradient(#fff,#e6e6ff,#a0a0ff);

-webkit-background-clip:text;

color:transparent;

text-shadow:
0 0 20px #fff,
0 0 40px #8b5cff;

}

/* NAV */

nav{

display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:40px;

}

/* BOTONES CHROME */

.nav-btn{

padding:14px 35px;

border-radius:14px;

border:1px solid #ffffff80;

background:linear-gradient(
180deg,
#ffffff,
#dcdcdc,
#a8a8a8,
#ffffff
);

color:#111;

font-weight:bold;

box-shadow:

inset 0 3px 6px #ffffff,
0 6px 20px rgba(0,0,0,.7);

cursor:pointer;

transition:.3s;

}

.nav-btn:hover{

transform:translateY(-4px);

box-shadow:
0 0 20px #c59cff;

}

/* HERO */

.hero{

display:flex;

justify-content:center;

align-items:center;

flex-wrap:wrap;

gap:70px;

padding:70px;

}

.hero img{

width:420px;

border-radius:20px;

box-shadow:
0 0 40px #ff7bff;

}

/* TEXTO */

.hero-text{

max-width:450px;

}

.hero-text h1{

font-size:48px;

margin-bottom:20px;

text-shadow:
0 0 20px #fff;

}

.hero-text p{

opacity:.9;

margin-bottom:30px;

}

/* SECTIONS */

.section{

padding:100px;

text-align:center;

}

/* TARJETAS REVISTA */

.cards{

display:flex;

justify-content:center;

gap:30px;

flex-wrap:wrap;

margin-top:40px;

}

.card{

width:260px;

padding:18px;

border-radius:20px;

background:rgba(255,255,255,.1);

backdrop-filter:blur(10px);

box-shadow:
0 0 30px rgba(255,255,255,.4);

transition:.3s;

}

.card img{

width:100%;

border-radius:15px;

margin-bottom:10px;

}

.card:hover{

transform:scale(1.05);

}

/* EVENTOS */

.events{

max-width:650px;

margin:auto;

margin-top:40px;

}

.event{

display:flex;

justify-content:space-between;

padding:14px;

margin-bottom:12px;

border-radius:12px;

background:linear-gradient(#ffffff,#cfcfcf,#9a9a9a);

color:black;

font-weight:bold;

}

/* FOOTER */

footer{

margin-top:80px;

text-align:center;

padding:30px;

background:#000;

}

</style>

</head>

<body>

<header>DRACUNNA DJ</header>

<nav>

<a href="#music"><button class="nav-btn">MUSIC</button></a>
<a href="#mixes"><button class="nav-btn">MIXES</button></a>
<a href="#events"><button class="nav-btn">EVENTS</button></a>
<a href="#contact"><button class="nav-btn">CONTACT</button></a>

</nav>

<section class="hero" id="music">

<img src="https://images.unsplash.com/photo-1520975922323-8a1e6c3d6b72">

<div class="hero-text">

<h1>WELCOME TO THE FUTURE</h1>

<p>Cyber rave DJ experience.</p>

<button class="nav-btn">LISTEN NOW</button>

</div>

</section>

<section class="section" id="mixes">

<h2>Latest Mixes</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2">
Dreamscape EP
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d">
Cyber Wave Mix
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1506157786151-b8491531f063">
Future Rave
</div>

</div>

</section>

<section class="section" id="events">

<h2>Upcoming Events</h2>

<div class="events">

<div class="event">
<span>Dream Rave</span>
<span>London</span>
</div>

<div class="event">
<span>Club Neon</span>
<span>Tokyo</span>
</div>

<div class="event">
<span>Future Fest</span>
<span>Paris</span>
</div>

</div>

</section>

<section class="section" id="contact">

<h2>Booking</h2>

<p>Email: booking@dracunna.com</p>

</section>

<footer>

© 2026 DRACUNNA DJ

</footer>

</body>
</html>
