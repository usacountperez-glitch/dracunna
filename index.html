<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cyber Y2K TV Room</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;

background:url("images/fondo.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* capa neon */

.neon-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(45deg,
rgba(255,0,150,0.25),
rgba(0,200,255,0.25));
mix-blend-mode:screen;
pointer-events:none;
animation:neonPulse 6s infinite alternate;
}

@keyframes neonPulse{
0%{opacity:0.4;}
100%{opacity:0.9;}
}

/* efecto TVs */

.tv-effect{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,0.04) 0px,
rgba(255,255,255,0.04) 2px,
transparent 2px,
transparent 4px
);
animation:scanlines 1s linear infinite;
}

@keyframes scanlines{
0%{transform:translateY(0);}
100%{transform:translateY(4px);}
}

/* brillo TVs */

.tv-glow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:radial-gradient(circle at 50% 40%,
rgba(255,0,200,0.4),
transparent 60%);
animation:glow 4s infinite alternate;
}

@keyframes glow{
0%{opacity:0.3;}
100%{opacity:0.7;}
}

/* barra menu */

.nav{

background:rgba(0,0,0,0.6);
padding:15px;
backdrop-filter:blur(8px);
}

.nav button{

background:linear-gradient(45deg,#ff00cc,#8a2be2);
border:none;
padding:12px 25px;
margin:5px;
color:white;
font-weight:bold;
border-radius:20px;
cursor:pointer;
box-shadow:0 0 10px hotpink;
}

/* panel central */

.panel{

margin-top:120px;
display:inline-block;
background:rgba(0,0,0,0.65);
padding:40px;
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px hotpink;
}

/* texto */

h1{

font-size:40px;
letter-spacing:4px;
text-shadow:0 0 15px hotpink;
}

p{
opacity:0.9;
}

audio{

margin-top:20px;
}

</style>

</head>

<body>

<div class="neon-overlay"></div>
<div class="tv-effect"></div>
<div class="tv-glow"></div>

<div class="nav">

<button>HOME</button>
<button>FOTOS</button>
<button>DJ</button>

</div>

<div class="panel">

<h1>NOW PLAYING</h1>

<p>Cyber Y2K TV Room</p>

<audio controls>
<source src="music/song.mp3" type="audio/mpeg">
</audio>

</div>

</body>
</html>
