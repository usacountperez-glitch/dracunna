<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dracunna DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

/* FONDO CYBERPUNK */

body{

background:
radial-gradient(circle at 30% 30%,rgba(255,0,200,.3),transparent),
radial-gradient(circle at 70% 50%,rgba(0,200,255,.3),transparent),
linear-gradient(#060012,#140034);

color:white;

overflow-x:hidden;

}

/* CIUDAD CYBERPUNK */

body::after{

content:"";

position:fixed;

bottom:0;

width:100%;

height:320px;

background:url("https://images.unsplash.com/photo-1519608487953-e999c86e7455");

background-size:cover;

opacity:.35;

animation:cityMove 60s linear infinite;

}

@keyframes cityMove{

0%{background-position:0 0}
100%{background-position:2000px 0}

}

/* HEADER */

header{

text-align:center;

font-size:70px;

padding:40px;

background:linear-gradient(#fff,#a780ff);

-webkit-background-clip:text;

color:transparent;

text-shadow:0 0 30px #b060ff;

}

/* BOTONES */

button{

padding:14px 28px;

border-radius:20px;

border:none;

font-weight:bold;

background:linear-gradient(#fff,#dcdcdc,#aaa);

box-shadow:
inset 0 2px 6px #fff,
0 6px 20px rgba(0,0,0,.8);

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.1);

box-shadow:0 0 20px #ff7bff;

}

/* HERO */

.hero{

display:flex;

justify-content:center;

align-items:center;

flex-wrap:wrap;

gap:60px;

padding:80px;

}

.hero img{

width:420px;

border-radius:20px;

box-shadow:0 0 50px #ff7bff;

}

/* PLAYER */

.player{

margin-top:20px;

}

/* VISUALIZER */

.visualizer{

width:120px;

height:120px;

border-radius:50%;

border:3px solid #b080ff;

margin-top:20px;

animation:spin 8s linear infinite;

box-shadow:0 0 30px #b080ff;

}

@keyframes spin{

from{transform:rotate(0)}
to{transform:rotate(360deg)}

}

/* SECTIONS */

section{

padding:80px 40px;

text-align:center;

}

/* CARDS */

.cards{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:30px;

margin-top:40px;

}

.card{

width:260px;

background:rgba(255,255,255,.08);

padding:16px;

border-radius:20px;

backdrop-filter:blur(10px);

box-shadow:0 0 25px rgba(255,255,255,.3);

transition:.3s;

}

.card:hover{

transform:scale(1.08);

box-shadow:0 0 40px #ff7bff;

}

.card img{

width:100%;

border-radius:12px;

margin-bottom:10px;

}

/* FOOTER */

footer{

margin-top:80px;

background:black;

padding:20px;

text-align:center;

}

</style>
</head>

<body>

<header>DRACUNNA DJ</header>

<div class="hero">

<img src="images/WhatsApp Image 2026-03-11 at 10.44.30 PM.jpeg">

<div>

<h1>Cyber Rave Experience</h1>

<p>Electronic DJ sets / live performances</p>

<button onclick="document.getElementById('music').play()">PLAY MIX</button>

<div class="player">

<audio id="music" controls>
<source src="music/mix.mp3" type="audio/mpeg">
</audio>

</div>

<div class="visualizer"></div>

</div>

</div>

<section>

<h2>Latest Mixes</h2>

<div class="cards">

<div class="card">
<img src="images/WhatsApp Image 2026-03-11 at 10.44.43 PM.jpeg">
Dreamscape Mix
</div>

<div class="card">
<img src="images/WhatsApp Image 2026-03-11 at 10.47.51 PM (1).jpeg">
Cyber Wave
</div>

<div class="card">
<img src="images/WhatsApp Image 2026-03-11 at 10.47.51 PM (2).jpeg">
Future Rave
</div>

</div>

</section>

<section>

<h2>Gallery</h2>

<div class="cards">

<div class="card"><img src="images/WhatsApp Image 2026-03-11 at 10.47.51 PM (4).jpeg"></div>
<div class="card"><img src="images/WhatsApp Image 2026-03-11 at 10.47.51 PM (5).jpeg"></div>
<div class="card"><img src="images/WhatsApp Image 2026-03-11 at 10.47.51 PM (6).jpeg"></div>
<div class="card"><img src="images/WhatsApp Image 2026-03-11 at 10.47.51 PM (7).jpeg"></div>

</div>

</section>

<footer>

© 2026 Dracunna DJ

</footer>

</body>
</html>
