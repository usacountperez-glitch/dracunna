<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dracunna DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

background:
radial-gradient(circle at 30% 30%,rgba(255,0,200,.3),transparent),
radial-gradient(circle at 70% 50%,rgba(0,200,255,.3),transparent),
linear-gradient(#050010,#140034);

color:white;

min-height:100vh;

}

/* HEADER */

header{

text-align:center;

font-size:70px;

padding:40px;

background:linear-gradient(#fff,#a680ff);

-webkit-background-clip:text;

color:transparent;

text-shadow:0 0 30px #a66cff;

}

/* NAV */

nav{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

margin-bottom:40px;

}

button{

padding:12px 26px;

border-radius:18px;

border:none;

font-weight:bold;

background:linear-gradient(#ffffff,#dcdcdc,#a9a9a9);

box-shadow:
inset 0 2px 6px #fff,
0 6px 20px rgba(0,0,0,.8);

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.1);

box-shadow:0 0 25px #ff7bff;

}

/* HERO */

.hero{

display:flex;

justify-content:center;

align-items:center;

flex-wrap:wrap;

gap:60px;

padding:80px;

}

.hero img{

width:420px;

border-radius:20px;

box-shadow:0 0 40px #ff60ff;

}

/* SECTIONS */

section{

padding:80px 40px;

text-align:center;

}

/* CARDS */

.cards{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:30px;

margin-top:40px;

}

.card{

width:260px;

background:rgba(255,255,255,.08);

padding:16px;

border-radius:20px;

backdrop-filter:blur(10px);

box-shadow:0 0 25px rgba(255,255,255,.3);

transition:.3s;

}

.card:hover{

transform:scale(1.05);

box-shadow:0 0 40px #ff7bff;

}

.card img{

width:100%;

border-radius:14px;

margin-bottom:10px;

}

/* EVENTS */

.events{

max-width:700px;

margin:auto;

}

.event{

background:linear-gradient(#fff,#cfcfcf,#9f9f9f);

color:black;

padding:14px;

margin:10px 0;

border-radius:12px;

display:flex;

justify-content:space-between;

font-weight:bold;

}

/* FOOTER */

footer{

margin-top:60px;

background:black;

padding:20px;

text-align:center;

}

</style>

</head>

<body>

<header>DRACUNNA DJ</header>

<nav>

<button>Music</button>
<button>Mixes</button>
<button>Gallery</button>
<button>Events</button>
<button>Contact</button>

</nav>

<div class="hero">

<img src="images/hero.jpg">

<div>

<h1>Cyber Rave Experience</h1>

<p>Electronic DJ sets and live performances</p>

<button>Listen Now</button>

</div>

</div>

<section>

<h2>Latest Mixes</h2>

<div class="cards">

<div class="card">

<img src="images/mix1.jpg">

Dreamscape Mix

</div>

<div class="card">

<img src="images/mix2.jpg">

Cyber Wave

</div>

<div class="card">

<img src="images/mix3.jpg">

Future Rave

</div>

</div>

</section>

<section>

<h2>Gallery</h2>

<div class="cards">

<div class="card"><img src="images/gallery1.jpg"></div>
<div class="card"><img src="images/gallery2.jpg"></div>
<div class="card"><img src="images/gallery3.jpg"></div>
<div class="card"><img src="images/gallery4.jpg"></div>

</div>

</section>

<section>

<h2>Events</h2>

<div class="events">

<div class="event">

<span>Rossstream</span>

<span>Bogotá</span>

</div>

<div class="event">

<span>Abyssal Rite</span>

<span>Berlin</span>

</div>

</div>

</section>

<footer>

© 2026 Dracunna DJ

</footer>

</body>
</html>
