<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dracunna DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:linear-gradient(135deg,#0f0024,#240046,#5a189a);
color:white;
text-align:center;
padding:40px;
}

h1{
font-size:50px;
margin-bottom:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:12px;
transition:0.4s;
box-shadow:0 0 20px rgba(255,0,255,0.4);
}

.gallery img:hover{
transform:scale(1.08);
box-shadow:0 0 40px rgba(0,255,255,0.8);
}

footer{
margin-top:60px;
opacity:0.6;
}

</style>
</head>

<body>

<h1>DRACUNNA DJ</h1>

<div class="gallery">

<img src="dj1.jpg">

<img src="WhatsApp Image 2026-03-11 at 10.47.51 PM.jpeg">

<img src="WhatsApp Image 2026-03-11 at 10.47.52 PM.jpeg">

<img src="WhatsApp Image 2026-03-11 at 10.47.53 PM.jpeg">

</div>

<footer>
<p>© Dracunna DJ</p>
</footer>

</body>
</html>
